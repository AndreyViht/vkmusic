name: –Р–≤—В–Њ—Б–±–Њ—А–Ї–∞ Viht Music VK

on:
  workflow_dispatch:
    inputs:
      namevers:
        description: "–Э–∞–Ј–≤–∞–љ–Є–µ —А–µ–ї–Є–Ј–∞"
        required: true
        default: "рЯ§Ц –Р–≤—В–Њ—Б–±–Њ—А–Ї–∞"
      descr:
        description: "–Ю–њ–Є—Б–∞–љ–Є–µ —А–µ–ї–Є–Ј–∞"
        required: true
        default: "вЭМ –Ю–њ–Є—Б–∞–љ–Є–µ —Б–±–Њ—А–Ї–Є –Њ—В—Б—Г—В—Б—В–≤—Г–µ—В"
      release:
        description: "–Т—Л–Ї–Є–љ—Г—В—М –≤ —А–µ–ї–Є–Ј?"
        required: true
        default: false
        type: boolean
      prerelease:
        description: "–Я—А–µ—А–µ–ї–Є–Ј?"
        required: true
        default: true
        type: boolean

  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        configuration: [Release]
        platform: [x64]

    runs-on:
      windows-latest # –Ф–ї—П –њ–Њ–ї—Г—З–µ–љ–Є—П —Б–њ–Є—Б–Ї–∞ –і–Њ—Б—В—Г–њ–љ—Л—Е —В–Є–њ–Њ–≤ —А–∞–љ–љ–µ—А–Њ–≤
      # —Б–Љ. https://help.github.com/en/actions/reference/workflow-syntax-for-github-actions#jobsjob_idruns-on

    env:
      Solution_Name: "VK UI3 (Package)" # –Ч–∞–Љ–µ–љ–Є—В–µ –љ–∞ –Є–Љ—П –≤–∞—И–µ–≥–Њ —А–µ—И–µ–љ–Є—П, –љ–∞–њ—А–Є–Љ–µ—А, App1.sln.
      Solution_Name_Unpacked: "VK UI3"
      Configuration_unpacked: Unpacked

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          node-version: 16
          fetch-depth: 0

      # –Ф–µ–Ї–Њ–і–Є—А—Г–µ–Љ –Ј–∞–Ї–Њ–і–Є—А–Њ–≤–∞–љ–љ—Л–є –≤ base64 pfx –Є —Б–Њ—Е—А–∞–љ—П–µ–Љ Signing_Certificate
      - name: Decode the pfx
        run: |
          $certificatePath = "${{ github.workspace }}\GitHubActionsWorkflow.pfx"
          $base64Pfx = "${{ secrets.BASE64_ENCODED_PFX }}"
          $pfxPasswordStr = "${{ secrets.PFX_PASSWORD }}"
          if ([string]::IsNullOrEmpty($pfxPasswordStr)) {
            $pfxPasswordStr = "AutoGeneratedPassword123"
          }
          $pfxPassword = ConvertTo-SecureString -String $pfxPasswordStr -AsPlainText -Force

          if ([string]::IsNullOrEmpty($base64Pfx)) {
            Write-Host "BASE64_ENCODED_PFX secret is empty. Generating self-signed cert..."
            $cert = New-SelfSignedCertificate -Type Custom -Subject "CN=FDW" -KeyUsage DigitalSignature -FriendlyName "FDW Cert" -CertStoreLocation "Cert:\CurrentUser\My" -TextExtension @("2.5.29.37={text}1.3.6.1.5.5.7.3.3")
            Export-PfxCertificate -Cert $cert -FilePath $certificatePath -Password $pfxPassword
          } else {
            Write-Host "Decoding from secrets.BASE64_ENCODED_PFX..."
            $pfx_cert_byte = [System.Convert]::FromBase64String($base64Pfx)
            [IO.File]::WriteAllBytes($certificatePath, $pfx_cert_byte)
          }
      - name: –Ю–±–љ–Њ–≤–Є—В—М TOKEN_STAT_SLY
        run: |
          $repoName = "${{ github.repository }}".Split('/')[1]
          $content = Get-Content -Path "D:\a\$repoName\$repoName\VK UI3\StaticParams.cs"
          $updatedContent = $content -replace 'Environment.GetEnvironmentVariable\("TOKEN_STAT_SLY"\)', '"${{ secrets.TOKEN_STAT_SLY }}"'
          Set-Content -Path "D:\a\$repoName\$repoName\VK UI3\StaticParams.cs" -Value $updatedContent
          Write-Output $updatedContent
      - name: Display disk tree
        run: |
          Get-ChildItem -Recurse | Sort-Object Length -Descending
      # –£—Б—В–∞–љ–Њ–≤–Є—В—М .NET Core
      - name: Install .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      # –Ф–Њ–±–∞–≤–Є—В—М MSBuild –≤ PATH: https://github.com/microsoft/setup-msbuild
      - name: Setup MSBuild.exe
        uses: microsoft/setup-msbuild@v2

        ################################
      - name: –Ш–Ј–≤–ї–µ—З—М –≤–µ—А—Б–Є—О
        id: get_version
        run: |
          $repoName = "${{ github.repository }}".Split('/')[1]
          $csprojPath = "D:\a\$repoName\$repoName\VK UI3\VK UI3.csproj"
          $doc = New-Object xml
          $doc.Load((Convert-Path $csprojPath))
          $version = $doc.SelectSingleNode('//AppxPackageVersion').InnerText
          echo "::set-output name=VERSION::$version"
          echo "–Т–µ—А—Б–Є—П: $version"
        continue-on-error: true

      - name: –Я–Њ–і—Б—В–∞–≤–Є—В—М –≤–µ—А—Б–Є—О –≤ Package.appxmanifest
        run: |
          $repoName = "${{ github.repository }}".Split('/')[1]
          $csproj = "D:\a\$repoName\$repoName\VK UI3\VK UI3.csproj"
          $manifest = "D:\a\$repoName\$repoName\VK UI3 (Package)\Package.appxmanifest"
          [xml]$doc = Get-Content $csproj
          $version = $doc.SelectSingleNode('//AppxPackageVersion').InnerText.Trim()
          [xml]$xml = Get-Content $manifest
          $xml.Package.Identity.Version = $version
          $xml.Save($manifest)
          
      - name: Clean publish directories
        run: |
          Remove-Item -Recurse -Force publish-x64, publish-x86, publish-arm64 -ErrorAction SilentlyContinue
        
        ################################

      # –Т–Њ—Б—Б—В–∞–љ–Њ–≤–Є—В—М –њ—А–Є–ї–Њ–ґ–µ–љ–Є–µ –і–ї—П –Ј–∞–њ–Њ–ї–љ–µ–љ–Є—П –њ–∞–њ–Ї–Є obj RuntimeIdentifiers
      - name: Restore the application
        run: msbuild $env:Solution_Name /t:Restore /p:Configuration=$env:Configuration /clp:Minimal
        env:
          Configuration: ${{ matrix.configuration }}

      - name: Print working directory
        run: |
          Write-Host "Current working directory: $(Get-Location)"
      - name: Get Certificate Thumbprint and Replace in Project File
        run: |
          $certificatePath = "${{ github.workspace }}\GitHubActionsWorkflow.pfx"
          $pfxPasswordStr = "${{ secrets.PFX_PASSWORD }}"
          if ([string]::IsNullOrEmpty($pfxPasswordStr)) {
            $pfxPasswordStr = "AutoGeneratedPassword123"
          }
          $pfxPassword = ConvertTo-SecureString -String $pfxPasswordStr -AsPlainText -Force
          $pfxCert = Get-PfxCertificate -FilePath $certificatePath -Password $pfxPassword
          Write-Host "Certificate Thumbprint: $($pfxCert.Thumbprint)"
          $projectFile = "VK UI3 (Package)/VK UI3 (Package).wapproj"
          $content = Get-Content -Path $projectFile -Raw
          $content = $content -replace '(?<=<PackageCertificateThumbprint>).+?(?=</PackageCertificateThumbprint>)', $pfxCert.Thumbprint
          Set-Content -Path $projectFile -Value $content
      - name: Install PFX certificate
        run: |
          $certificatePath = "${{ github.workspace }}\GitHubActionsWorkflow.pfx"
          $pfxPasswordStr = "${{ secrets.PFX_PASSWORD }}"
          if ([string]::IsNullOrEmpty($pfxPasswordStr)) {
            $pfxPasswordStr = "AutoGeneratedPassword123"
          }
          $password = ConvertTo-SecureString -String $pfxPasswordStr -Force -AsPlainText
          Import-PfxCertificate -FilePath $certificatePath -CertStoreLocation Cert:\LocalMachine\My -Password $password
      # –°–Њ–Ј–і–∞–љ–Є–µ –њ–∞–Ї–µ—В–∞ –њ—А–Є–ї–Њ–ґ–µ–љ–Є—П –њ—Г—В–µ–Љ —Б–±–Њ—А–Ї–Є –Є —Г–њ–∞–Ї–Њ–≤–Ї–Є –њ—А–Њ–µ–Ї—В–∞
      - name: Create the app package
        run: |
          $pfxPasswordStr = "${{ secrets.PFX_PASSWORD }}"
          if ([string]::IsNullOrEmpty($pfxPasswordStr)) {
            $pfxPasswordStr = "AutoGeneratedPassword123"
          }
          $platforms = "x64"
          foreach ($platform in $platforms) {
            $certificatePath = "${{ github.workspace }}\GitHubActionsWorkflow.pfx"
            msbuild $env:Solution_Name `
              /p:Configuration=$env:Configuration `
              /p:Platform=$platform `
              /p:UapAppxPackageBuildMode=$env:Appx_Package_Build_Mode `
              /p:AppxBundle=$env:Appx_Bundle `
              /p:PackageCertificateKeyFile="$certificatePath" `
              /p:PackageCertificatePassword="$pfxPasswordStr" `
              /p:AppxPackageDir="$env:Appx_Package_Dir" `
              /p:GenerateAppxPackageOnBuild=true `
              /p:TOKEN_STAT_SLY="${{ secrets.TOKEN_STAT_SLY }}" `
              /p:EnableNETAnalyzers=false `
              /p:WarningLevel=0 `
              /p:TreatWarningsAsErrors=false `
              /clp:ErrorsOnly
          }
        env:
          Appx_Bundle: Never
          Appx_Package_Build_Mode: SideloadOnly
          Appx_Package_Dir: Packages\
          Configuration: ${{ matrix.configuration }}
          TOKEN_STAT_SLY: ${{ secrets.TOKEN_STAT_SLY }}

      # –£–і–∞–ї–Є—В—М pfx
      - name: Remove the pfx
        run: |
          $certificatePath = "${{ github.workspace }}\GitHubActionsWorkflow.pfx"
          Remove-Item -path "$certificatePath"
      # –Я–µ—А–µ–Є–Љ–µ–љ–Њ–≤–∞—В—М .cer —Д–∞–є–ї
      - name: Rename the .cer file
        run: |
          Get-ChildItem -Path "${{ env.Solution_Name }}\\Packages" -Filter *.cer -Recurse -Depth 1 | ForEach-Object {
            Rename-Item -Path $_.FullName -NewName "Certificate.cer"
          }
      # Move .msix, .cer, and .msixbundle files from subfolders to the Packages folder
      - name: Move files to the Packages folder
        run: |
          $fileTypes = "*.msix", "*.cer", "*.msixbundle"
          foreach ($fileType in $fileTypes) {
            Get-ChildItem -Path "${{ env.Solution_Name }}\\Packages" -Filter $fileType -Recurse -Depth 1 | ForEach-Object {
              $destinationFile = "${{ env.Solution_Name }}\\Packages\\" + $_.Name
              if (-Not (Test-Path -Path $destinationFile)) {
                Move-Item -Path $_.FullName -Destination $destinationFile
              }
            }
          }
      - name: Display disk tree
        run: |
          Get-ChildItem -Recurse | Sort-Object Length -Descending
      # Upload the MSIX package: https://github.com/marketplace/actions/upload-a-build-artifact
      - name: Upload MSIX package
        uses: actions/upload-artifact@v4
        with:
          name: MSIX Package
          path: |
            ${{ env.Solution_Name }}\\Packages\*.cer
            ${{ env.Solution_Name }}\\Packages\*.msixbundle
            ${{ env.Solution_Name }}\\Packages\*.msix
      
      - name: –Я–Њ–ї—Г—З–Є—В—М —А–µ–ї–Є–Ј—Л
        id: get_releases
        run: |
          $headers = @{
            "Authorization" = "token ${{ secrets.TOKEN }}"
          }
          $releases = Invoke-RestMethod -Uri "https://api.github.com/repos/${{ github.repository }}/releases" -Headers $headers
          echo "::set-output name=releases::$releases"
        shell: pwsh
        if: github.event.inputs.release == 'true'








#-------------------------------------------------------EXE





      - name: Clean build artifacts
        run: msbuild $env:Solution_Name /t:Clean /p:Configuration=$env:Configuration
        env:
          Configuration: ${{ matrix.configuration }}

      # PFX
      - name: Decode PFX
        run: |
          $certPath = "${{ github.workspace }}\signcert.pfx"
          $base64Pfx = "${{ secrets.BASE64_ENCODED_PFX }}"
          $pfxPasswordStr = "${{ secrets.PFX_PASSWORD }}"
          if ([string]::IsNullOrEmpty($pfxPasswordStr)) {
            $pfxPasswordStr = "AutoGeneratedPassword123"
          }
          $pfxPassword = ConvertTo-SecureString -String $pfxPasswordStr -AsPlainText -Force

          if ([string]::IsNullOrEmpty($base64Pfx)) {
            Write-Host "BASE64_ENCODED_PFX secret is empty. Generating self-signed cert for signing exe..."
            $cert = New-SelfSignedCertificate -Type Custom -Subject "CN=FDW" -KeyUsage DigitalSignature -FriendlyName "FDW Cert" -CertStoreLocation "Cert:\CurrentUser\My" -TextExtension @("2.5.29.37={text}1.3.6.1.5.5.7.3.3")
            Export-PfxCertificate -Cert $cert -FilePath $certPath -Password $pfxPassword
          } else {
            Write-Host "Decoding from secrets.BASE64_ENCODED_PFX..."
            $bytes = [Convert]::FromBase64String($base64Pfx)
            [IO.File]::WriteAllBytes($certPath, $bytes)
          }
      # 1. –°–±–Њ—А–Ї–∞
      - name: Build EXE
        shell: pwsh
        run: |
          $arches = @(
            @{ Platform = "x64";   RID = "win-x64"   }
          )
      
          foreach ($a in $arches) {
            Write-Host "=== Build $($a.Platform) ==="
            msbuild "$env:Solution_Name_Unpacked\$env:Solution_Name_Unpacked.csproj" `
              "/p:Configuration=$env:Configuration_unpacked" `
              "/p:Platform=$($a.Platform)" `
              "/p:RuntimeIdentifier=$($a.RID)" `
              /restore `
              /p:DisableRuntimeIdentifierInference=true `
              /p:EnableNETAnalyzers=false `
              /p:WarningLevel=0 `
              /p:TreatWarningsAsErrors=false `
              /clp:ErrorsOnly

          }

# 2. –Я–Њ–і–њ–Є—Б—М
      - name: Sign exe
        shell: pwsh
        run: |
          $certPath = "${{ github.workspace }}\signcert.pfx"
          $password = "${{ secrets.PFX_PASSWORD }}"
          if ([string]::IsNullOrEmpty($password)) {
            $password = "AutoGeneratedPassword123"
          }
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter signtool.exe |
                      Where-Object { $_.FullName -match 'x64' } |
                      Select-Object -First 1 -ExpandProperty FullName
          if (-not $signtool) { throw "signtool.exe –љ–µ –љ–∞–є–і–µ–љ" }
      
          $arches = @("x64")
          foreach ($platform in $arches) {
            $exe = Get-ChildItem "$env:Solution_Name_Unpacked\bin\$platform\$env:Configuration_unpacked" -Recurse -Include *.exe | Select-Object -First 1
            if (-not $exe) { throw "–Э–µ –љ–∞–є–і–µ–љ exe –і–ї—П $platform" }
            & $signtool sign /f $certPath /p $password /tr http://timestamp.digicert.com /td sha256 /fd sha256 $exe.FullName
          }

      # 3. –Р—А—Е–Є–≤–Є—А–Њ–≤–∞–љ–Є–µ —Ж–µ–ї–Њ–є buildвАС–њ–∞–њ–Ї–Є
      - name: Package build folders
        shell: pwsh
        run: |
          $arches = @("x64")
          foreach ($platform in $arches) {
            $buildDir = Join-Path "$env:Solution_Name_Unpacked\bin" "$platform\$env:Configuration_unpacked"
            if (-not (Test-Path $buildDir)) { throw "–Я–∞–њ–Ї–∞ —Б–±–Њ—А–Ї–Є –і–ї—П $platform –љ–µ –љ–∞–є–і–µ–љ–∞" }
      
            $zipName = "VK_UI3_$platform.zip"
            if (Test-Path $zipName) { Remove-Item $zipName -Force }
      
            Compress-Archive -Path "$buildDir\*" -DestinationPath $zipName -Force
          }

      - name: Upload zips to artifacts
        uses: actions/upload-artifact@v4
        with:
          name: VK_UI3_Zips_${{ github.run_id }}
          path: VK_UI3_*.zip
          retention-days: 30



#------------------------------------------


      - name: –Я—А–Њ–≤–µ—А–Є—В—М —Б—Г—Й–µ—Б—В–≤–Њ–≤–∞–љ–Є–µ —А–µ–ї–Є–Ј–∞
        id: check_release
        run: |
          $version = "${{ steps.get_version.outputs.VERSION }}"
          $headers = @{
            "Authorization" = "token ${{ secrets.TOKEN }}"
            "Accept" = "application/vnd.github.v3+json"
          }
          try {
            $releases = Invoke-RestMethod -Uri "https://api.github.com/repos/${{ github.repository }}/releases" -Headers $headers
            $release = $releases | Where-Object { $_.tag_name -eq $version -and $_.draft -eq $false -and $_.prerelease -eq $false }
            if ($release) {
              Write-Host "–†–µ–ї–Є–Ј —Б —В–µ–≥–Њ–Љ $version —Г–ґ–µ —Б—Г—Й–µ—Б—В–≤—Г–µ—В"
              echo "exists=true" >> $env:GITHUB_OUTPUT
            } else {
              Write-Host "–†–µ–ї–Є–Ј —Б —В–µ–≥–Њ–Љ $version –љ–µ –љ–∞–є–і–µ–љ"
              echo "exists=false" >> $env:GITHUB_OUTPUT
            }
          } catch {
            Write-Host "–Ю—И–Є–±–Ї–∞ –њ—А–Є –њ—А–Њ–≤–µ—А–Ї–µ —А–µ–ї–Є–Ј–Њ–≤: $($_.Exception.Message)"
            echo "exists=false" >> $env:GITHUB_OUTPUT
          }
        shell: pwsh
        if: github.event.inputs.release == 'true'
      
      - name: –°–Њ–Ј–і–∞—В—М —А–µ–ї–Є–Ј
        id: create_release
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN }}
        with:
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          name: ${{ github.event.inputs.namevers }}
          body: |
            ${{ github.event.inputs.descr }}
          draft: false
          prerelease: ${{ github.event.inputs.prerelease == 'true' }}
          generate_release_notes: false
        if: steps.check_release.outputs.exists == 'false' && github.event.inputs.release == 'true'
        
      
      # –Ч–∞–≥—А—Г–Ј–Ї–∞ zip —Д–∞–є–ї–Њ–≤
      - name: Upload zips to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.TOKEN }}
          file: VK_UI3_*.zip
          tag: ${{ steps.get_version.outputs.VERSION }}
          overwrite: true
          file_glob: true
        if: steps.check_release.outputs.exists == 'false' && github.event.inputs.release == 'true'
      
      # –Ч–∞–≥—А—Г–Ј–Ї–∞ –њ–∞–Ї–µ—В–Њ–≤
      - name: Upload packages to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.TOKEN }}
          file: ${{ env.Solution_Name }}/Packages/*
          tag: ${{ steps.get_version.outputs.VERSION }}
          overwrite: true
          file_glob: true
        if: steps.check_release.outputs.exists == 'false' && github.event.inputs.release == 'true'


      - name: –Ю—В–њ—А–∞–≤–Є—В—М —Б–Њ–Њ–±—Й–µ–љ–Є–µ –≤ Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RELEASE_URL: https://github.com/${{ github.repository }}/releases/tag/${{ steps.get_version.outputs.VERSION }}
        run: |
          $telegramBotToken = '${{ secrets.TELEGRAM_BOT_TOKEN }}'
          $telegramChatId = '${{ secrets.TELEGRAM_CHAT_ID }}'
          $releaseUrl = 'https://github.com/${{ github.repository }}/releases/tag/${{ steps.get_version.outputs.VERSION }}'
          $message = @"
          <b>рЯОЙ –Э–Њ–≤—Л–є —А–µ–ї–Є–Ј:</b> ${{ github.event.inputs.namevers }}
          <b>рЯУ¶ –Т–µ—А—Б–Є—П:</b> ${{ steps.get_version.outputs.VERSION }}
          <b>рЯУЭ –Ю–њ–Є—Б–∞–љ–Є–µ:</b> ${{ github.event.inputs.descr }}
          <b>рЯФЧ <a href='$releaseUrl'>–°—Б—Л–ї–Ї–∞ –љ–∞ —А–µ–ї–Є–Ј</a></b>
          "@
          $uri = 'https://api.telegram.org/bot' + $telegramBotToken + '/sendMessage'
          $body = @{
              chat_id = $telegramChatId
              text = $message
              parse_mode = 'HTML'
          }
          $bodyJson = $body | ConvertTo-Json -Compress
          Invoke-RestMethod -Uri $uri -Method Post -Body $bodyJson -ContentType 'application/json'
        if: steps.check_release.outputs.exists == 'false' && github.event.inputs.release == 'true'
